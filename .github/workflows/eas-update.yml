name: EAS Update

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      channel:
        description: 'EAS Update Channel'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
          - development
      platform:
        description: 'Target Platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios
      message:
        description: 'Update Message'
        required: false
        type: string
        default: ''

jobs:
  update:
    name: Publish EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ${{ hashFiles('pnpm-lock.yaml') != '' && 'pnpm' || hashFiles('yarn.lock') != '' && 'yarn' || 'npm' }}

      - name: 🚀 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f "yarn.lock" ]; then
            yarn install --frozen-lockfile
          elif [ -f "bun.lockb" ]; then
            npm install -g bun
            bun install --frozen-lockfile
          else
            npm ci
          fi

      - name: 🚀 Publish Update
        env:
          EAS_UPDATE_CHANNEL: ${{ inputs.channel || 'production' }}
          EAS_UPDATE_PLATFORM: ${{ inputs.platform || 'all' }}
          EAS_UPDATE_MESSAGE: ${{ inputs.message || github.event.head_commit.message || '' }}
        run: |
          if [ -f "scripts/push-update.sh" ]; then
            chmod +x scripts/push-update.sh
            ./scripts/push-update.sh
          else
            npx eas-cli update --channel "$EAS_UPDATE_CHANNEL" --platform "$EAS_UPDATE_PLATFORM" --message "$EAS_UPDATE_MESSAGE"
          fi
